<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: "Bangers"; src: url("file:///Users/jperr/Documents/shorts/brand/fonts/Bangers-Regular.ttf"); }
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: -apple-system, "Helvetica Neue", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
  .stage { position: relative; width: 1080px; height: 320px; overflow: visible; }

  .pill {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background: rgba(16, 20, 24, 0.94);            /* Carbon Black */
    border: 2px solid rgba(46, 107, 255, 0.55);    /* Sapphire Glow edge */
    border-radius: 90px;
    padding: 16px 30px 16px 16px;
    display: flex; align-items: center; gap: 24px;
    box-shadow: 0 10px 34px rgba(0,0,0,0.45), 0 0 40px rgba(46,107,255,0.28);
  }

  .avatar {
    width: 128px; height: 128px; border-radius: 50%;
    overflow: hidden; flex: none;
    border: 3px solid #2E6BFF;
    box-shadow: 0 0 24px rgba(46,107,255,0.65);
  }
  .avatar img { width: 100%; height: 100%; display: block; }

  .who { display: flex; flex-direction: column; gap: 4px; min-width: 330px; }
  .handle {
    font-family: "Bangers", Impact, "Arial Black", sans-serif;
    font-size: 56px; line-height: 1;
    color: #E8ECF1;                                /* Platinum */
    letter-spacing: 1px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }
  .handle .zero { color: #2E6BFF; position: relative; }
  .handle .zero::after {
    content: ''; position: absolute;
    left: 50%; top: 6%; height: 88%; width: 4px;
    background: #2E6BFF; border-radius: 2px;
    transform: translateX(-50%) rotate(24deg);
  }
  .tag {
    font-size: 22px; font-weight: 700; letter-spacing: 4px;
    color: rgba(232, 236, 241, 0.62);
  }

  .icon-btn {
    width: 64px; height: 64px;
    border: none; background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0; flex: none;
    transform-origin: center; transition: none;
  }
  .icon-btn svg { width: 56px; height: 56px; }
  .thumb path { fill: #aab4bf; transition: fill 120ms ease; }
  .thumb.liked path { fill: #2E6BFF; }

  .sub-btn {
    border: none; cursor: pointer; flex: none;
    border-radius: 100px;
    padding: 18px 36px;
    font-weight: 800; letter-spacing: 0.5px;
    font-size: 30px;
    background: #cc0000; color: #ffffff;
    transform-origin: center;
    transition: background 220ms ease, color 220ms ease;
    font-family: inherit;
  }
  .sub-btn.subscribed { background: #2a3340; color: #aab4bf; }

  .bell { transform-origin: 50% 18%; }
  .bell path { fill: #aab4bf; transition: fill 120ms ease; }
  .bell.on path { fill: #E8ECF1; }

  .cursor {
    position: absolute;
    width: 44px; height: 44px;
    pointer-events: none; z-index: 50;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.35));
  }

  /* Burst rings that radiate out when each button is clicked. */
  .burst {
    position: absolute;
    border: 4px solid;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.2);
  }
</style>
</head>
<body>
<div class="stage">
  <div class="pill" id="pill">
    <div class="avatar" id="avatar"><img src="assets/channel.png" alt=""></div>
    <div class="who">
      <div class="handle">@C<span class="zero">0</span>BALT_CUT</div>
      <div class="tag">LIKE &amp; SUBSCRIBE</div>
    </div>
    <button class="icon-btn thumb" id="thumbBtn" aria-label="Like">
      <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73V10z"/></svg>
    </button>
    <button class="sub-btn" id="subBtn"><span id="subText">SUBSCRIBE</span></button>
    <button class="icon-btn" id="bellBtn" aria-label="Bell">
      <svg class="bell" id="bell" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    </button>
  </div>
  <div class="burst" id="burstSub" style="border-color:#cc0000"></div>
  <div class="burst" id="burstLike" style="border-color:#2E6BFF"></div>
  <svg class="cursor" id="cursor" viewBox="0 0 32 32">
    <path d="M5 3 L5 23 L11 18 L14 27 L18 25 L15 17 L23 17 Z" fill="#000" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>
</div>
<script>
(() => {
  const stage = document.querySelector('.stage');
  const pill = document.getElementById('pill');
  const avatar = document.getElementById('avatar');
  const cursor = document.getElementById('cursor');
  const thumbBtn = document.getElementById('thumbBtn');
  const thumb = thumbBtn.querySelector('.thumb') || thumbBtn;
  const subBtn = document.getElementById('subBtn');
  const subText = document.getElementById('subText');
  const bell = document.getElementById('bell');
  const bellBtn = document.getElementById('bellBtn');
  const burstSub = document.getElementById('burstSub');
  const burstLike = document.getElementById('burstLike');

  // Layout: anchor centers within the 1080x320 stage. Computed at first frame.
  let anchors = null;
  function measure() {
    const stageRect = stage.getBoundingClientRect();
    function c(el) {
      const r = el.getBoundingClientRect();
      return { x: r.left - stageRect.left + r.width/2, y: r.top - stageRect.top + r.height/2 };
    }
    anchors = { thumb: c(thumbBtn), sub: c(subBtn), bell: c(bellBtn) };
  }

  const lerp = (a, b, t) => a + (b - a) * t;
  const clamp = (t, lo, hi) => Math.max(lo, Math.min(hi, t));
  const easeInOut = t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2;
  const easeOut = t => 1 - Math.pow(1 - t, 3);

  // Timeline (seconds). Total 3.0s — final hold keeps the finished state.
  //  0.00 - 0.30  pill pops in (back-out overshoot); cursor starts entering
  //  0.10 - 0.55  cursor enters from bottom-right, glides to SUBSCRIBE
  //  0.55 - 0.70  click punch on SUBSCRIBE; state flips to SUBSCRIBED; burst ring
  //  0.70 - 1.20  bell rings (dampened sinusoid)
  //  1.20 - 1.75  cursor glides to thumbs-up
  //  1.75 - 1.92  click punch on thumbs-up; thumb fills sapphire; burst ring
  //  1.92 - 3.00  hold finished state; avatar glow breathes throughout

  function setT(t) {
    if (!anchors) measure();
    const off = { x: 1080 + 60, y: 320 + 60 };

    // Pill pop-in: back-out overshoot 0.6 -> ~1.05 -> 1.0
    let ps = 1;
    if (t < 0.30) {
      const p = clamp(t / 0.30, 0, 1);
      const c1 = 1.70158, c3 = c1 + 1;
      const e = 1 + c3 * Math.pow(p - 1, 3) + c1 * Math.pow(p - 1, 2);
      ps = 0.6 + 0.4 * e;
    }
    pill.style.transform = `translate(-50%, -50%) scale(${ps.toFixed(4)})`;
    pill.style.opacity = t < 0.12 ? (t / 0.12).toFixed(3) : 1;

    // Avatar glow breathes (subtle sapphire pulse)
    const glow = 0.55 + 0.25 * Math.sin(t * Math.PI * 1.6);
    avatar.style.boxShadow = `0 0 ${Math.round(20 + 10 * glow)}px rgba(46,107,255,${glow.toFixed(3)})`;

    // Cursor position
    let cx, cy;
    if (t < 0.10) {
      cx = off.x; cy = off.y;
    } else if (t < 0.55) {
      const p = easeOut((t - 0.10) / 0.45);
      cx = lerp(off.x, anchors.sub.x + 14, p);
      cy = lerp(off.y, anchors.sub.y + 10, p);
    } else if (t < 1.20) {
      cx = anchors.sub.x + 14; cy = anchors.sub.y + 10;
    } else if (t < 1.75) {
      const p = easeInOut((t - 1.20) / 0.55);
      cx = lerp(anchors.sub.x + 14, anchors.thumb.x + 12, p);
      cy = lerp(anchors.sub.y + 10, anchors.thumb.y + 12, p);
    } else {
      cx = anchors.thumb.x + 12; cy = anchors.thumb.y + 12;
    }
    cursor.style.left = (cx - 6) + 'px';
    cursor.style.top = (cy - 4) + 'px';

    // SUBSCRIBE click punch (0.55 - 0.72)
    if (t >= 0.55 && t < 0.72) {
      const p = (t - 0.55) / 0.17;
      const s = p < 0.45 ? 1 - 0.18 * (p / 0.45) : 0.82 + 0.18 * ((p - 0.45) / 0.55);
      subBtn.style.transform = `scale(${s.toFixed(3)})`;
    } else {
      subBtn.style.transform = '';
    }
    if (t >= 0.62) {
      subBtn.classList.add('subscribed');
      subText.textContent = 'SUBSCRIBED';
      bell.classList.add('on');
    }

    // SUBSCRIBE burst ring (0.62 - 0.90)
    if (t >= 0.62 && t < 0.90) {
      const p = (t - 0.62) / 0.28;
      const r = lerp(0.4, 2.6, p);
      const op = 0.7 * (1 - p);
      burstSub.style.left = anchors.sub.x + 'px';
      burstSub.style.top = anchors.sub.y + 'px';
      burstSub.style.width = '120px';
      burstSub.style.height = '120px';
      burstSub.style.transform = `translate(-50%,-50%) scale(${r.toFixed(3)})`;
      burstSub.style.opacity = op.toFixed(3);
    } else {
      burstSub.style.opacity = 0;
    }

    // Bell ring (0.70 - 1.25)
    if (t >= 0.70 && t < 1.25) {
      const p = (t - 0.70) / 0.55;
      const amp = 32 * Math.pow(1 - p, 1.2);
      const ang = Math.sin(p * Math.PI * 7) * amp;
      bell.style.transform = `rotate(${ang.toFixed(2)}deg)`;
    } else {
      bell.style.transform = '';
    }

    // THUMB click punch (1.75 - 1.94)
    if (t >= 1.75 && t < 1.94) {
      const p = (t - 1.75) / 0.19;
      const s = p < 0.45 ? 1 - 0.22 * (p / 0.45) : 0.78 + 0.22 * ((p - 0.45) / 0.55);
      thumbBtn.style.transform = `scale(${s.toFixed(3)})`;
    } else {
      thumbBtn.style.transform = '';
    }
    if (t >= 1.82) {
      thumb.classList.add('liked');
    }

    // THUMB burst ring (1.82 - 2.10)
    if (t >= 1.82 && t < 2.10) {
      const p = (t - 1.82) / 0.28;
      const r = lerp(0.4, 2.6, p);
      const op = 0.7 * (1 - p);
      burstLike.style.left = anchors.thumb.x + 'px';
      burstLike.style.top = anchors.thumb.y + 'px';
      burstLike.style.width = '110px';
      burstLike.style.height = '110px';
      burstLike.style.transform = `translate(-50%,-50%) scale(${r.toFixed(3)})`;
      burstLike.style.opacity = op.toFixed(3);
    } else {
      burstLike.style.opacity = 0;
    }
  }

  window.setT = setT;
  window.__ready = true;
  setT(0);
})();
</script>
</body>
</html>
